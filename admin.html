<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BBE Admin</title>
  <link rel="stylesheet" href="/admin/admin.css" />
  <script src="/admin/admin.js" defer></script>
</head>
<body>
  <div class="admin-app">
    <aside class="sidebar" hidden>
      <div>
        <div class="logo">BBE</div>
        <h1>Admin Workspace</h1>
        <nav id="sideNav" class="nav"></nav>
      </div>
      <div id="adminIdentity" class="sidebar-footer">Not signed in</div>
    </aside>
    <main class="main">
      <header id="workspaceTopbar" class="topbar panel" hidden>
        <input id="globalSearch" type="search" placeholder="Search" />
        <select id="globalRange"><option value="7d" selected>7 days</option><option value="30d">30 days</option><option value="90d">90 days</option><option value="custom">Custom</option></select>
        <input id="customStart" type="date" hidden />
        <input id="customEnd" type="date" hidden />
        <button id="refreshBtn" class="btn">Refresh</button>
        <button id="logoutBtn" class="btn">Logout</button>
      </header>
      <section id="authView" class="content panel"></section>
      <section id="workspace" class="content panel" hidden></section>
    </main>
    <aside id="detailDrawer" class="drawer">
      <div class="drawer-head"><strong id="drawerTitle">Details</strong><div><button id="drawerMinimize" class="btn btn-small">Minimize</button> <button id="drawerClose" class="btn btn-small">Close</button></div></div>
      <div id="drawerBody" class="drawer-body"></div>
    </aside>
  </div>
  <div id="toastRoot" class="toast-root"></div>
</body>
</html>
