<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BBE Admin</title>
  <link rel="stylesheet" href="/admin/admin.css" />
  <script src="/admin/admin.js" defer></script>
</head>
<body>
  <div class="admin-app">
    <aside class="sidebar"><div><div class="logo">BBE</div><h1>Admin Workspace</h1></div><div id="adminIdentity" class="sidebar-footer">Not signed in</div></aside>
    <main class="main">
      <header class="topbar panel">
        <input id="search" type="search" placeholder="Search products" />
        <select id="categoryFilter"><option value="">All categories</option><option>Flower</option><option>Concentrates</option><option>Accessories</option></select>
        <select id="publishedFilter"><option value="">All status</option><option value="1">Published</option><option value="0">Unpublished</option></select>
        <button id="newProductBtn" class="btn btn-gold">New Product</button>
        <button id="logoutBtn" class="btn">Logout</button>
      </header>
      <section id="authView" class="content panel"></section>
      <section id="workspace" class="content panel" hidden>
        <div id="productsList"></div>
      </section>
    </main>
  </div>
  <div id="toastRoot" class="toast-root"></div>
</body>
</html>
